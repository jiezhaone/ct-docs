name: Deploy User Manuals

on:
  push:
    branches: [main]

env:
  SSH: ssh -i ~/.ssh/deploy_key -p 65002 -o StrictHostKeyChecking=no -o ConnectTimeout=10
  SCP: scp -r -i ~/.ssh/deploy_key -P 65002 -o StrictHostKeyChecking=no -o ConnectTimeout=10
  TARGET: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 65002 ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy Admin Manual via SCP
        run: |
          REMOTE_DIR='~/domains/ct-passport.org/public_html/admin-manual'
          for attempt in 1 2 3; do
            echo "Attempt $attempt/3..."
            ${{ env.SSH }} ${{ env.TARGET }} "mkdir -p ${REMOTE_DIR}" && \
              ${{ env.SCP }} admin/docs/.vitepress/dist/* ${{ env.TARGET }}:${REMOTE_DIR}/ && \
              { echo "Admin manual deploy successful"; break; }
            [ $attempt -lt 3 ] && { echo "Retrying in 30s..."; sleep 30; } || { echo "All attempts failed"; exit 1; }
          done

      - name: Deploy App Manual via SCP
        run: |
          REMOTE_DIR='~/domains/ct-passport.org/public_html/app-manual'
          for attempt in 1 2 3; do
            echo "Attempt $attempt/3..."
            ${{ env.SSH }} ${{ env.TARGET }} "mkdir -p ${REMOTE_DIR}" && \
              ${{ env.SCP }} app/docs/.vitepress/dist/* ${{ env.TARGET }}:${REMOTE_DIR}/ && \
              { echo "App manual deploy successful"; break; }
            [ $attempt -lt 3 ] && { echo "Retrying in 30s..."; sleep 30; } || { echo "All attempts failed"; exit 1; }
          done

      - name: Health check
        run: |
          sleep 5
          for url in https://ct-passport.org/admin-manual/ https://ct-passport.org/app-manual/; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            echo "Health check $url: $STATUS"
            if [ "$STATUS" != "200" ] && [ "$STATUS" != "301" ] && [ "$STATUS" != "302" ]; then
              echo "Health check failed for $url"
              exit 1
            fi
          done
          echo "Both manuals are healthy"
